hydra:
  run:
    dir: .
  output_subdir: null

# Configuration for scripts/classify_taxonomy_games.py
# All fields are required by src/config.GenerationConfig.

# taxonomy_path is a bit of an old name, since now it points to CSV instead of taxonomy.md
taxonomy_path: data/mit.csv
template_csv_path: data/game_template.csv
output_csv_path: data/mit_game_fit.csv

llm_model: gpt-5.1
eval_model: gpt-5.1  # Unused in this script but required by GenerationConfig

concurrency: 20
timeout_secs: 120
dry_run: false
use_batch_api: true  # Set to true to use OpenAI Batch API (50% cost reduction, but slower)
skip_batch_polling: false  # If true, only submit batch and skip polling (use retrieve_classification_batches.py later)

# Threshold-related fields are unused here but required by GenerationConfig.
quality_threshold: 0
equilibria_threshold: 0
max_failed_samples_to_print: 0



