hydra:
  run:
    dir: .
  output_subdir: null

# Configuration for scripts/generate_contextualizations_from_filter.py

taxonomy_path: assets/taxonomy/taxonomy.md # NOT used by generate_contetualizations_from_filter.py
template_csv_path: data/game_template.csv
output_csv_path: data/gt-harmbench.csv
classification_csv_path: data/mit_game_fit.csv

llm_model: gpt-5.1
eval_model: gpt-5.1

concurrency: 20
timeout_secs: 120
dry_run: false
use_batch_api: true  # Set to true to use OpenAI Batch API (50% cost reduction, but slower)

quality_threshold: 8
equilibria_threshold: 8
max_failed_samples_to_print: 3



