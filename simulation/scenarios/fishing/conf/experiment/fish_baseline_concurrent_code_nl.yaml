name: ${group_name}
run_name: ""
storage_name: ""
scenario: fishing


defaults:
  - persona@personas.persona_0: selfish_fisherman
  - persona@personas.persona_1: selfish_fisherman
  - persona@personas.persona_2: selfish_fisherman
  - persona@personas.persona_3: selfish_fisherman
  - persona@personas.persona_4: selfish_fisherman

env:
  name: fish_baseline_concurrent_code_nl
  class_name: fishing_perturbation_concurrent_env
  max_num_rounds: 12
  initial_resource_in_pool: 100
  poupulation_change_after_round: double_100_cap
  observation_other_agents_harvesting: true
  language_nature: unconstrained
  num_agents: 5
  harvesting_order: concurrent
  assign_resource_strategy: stochastic
  inject_universalization: false
  inject_scenario_dynamic: false
  perturbations: []

personas:
  num: 5
  persona_0:
    name: John
  persona_1:
    name: Kate
  persona_2:
    name: Jack
  persona_3:
    name: Emma
  persona_4:
    name: Luke

agent:
  agent_package: persona_v3
  system_prompt: v3
  cot_prompt: think_step_by_step
  act:
    universalization_prompt: false
    harvest_strategy: one_step
    consider_identity_persona: true
  converse:
    inject_resource_observation: ${experiment.env.observation_other_agents_harvesting}
    inject_resource_observation_strategy: manager
    max_conversation_steps: 10
    prompt_utterance: one_shot
  store:
    expiration_delta:
      days: 63

contracting:
  enabled: true
  mode: code_nl
  negotiation_protocol: round_robin
  max_turns: 10
  min_agree_agents: 3
  max_coding_retries: 2
  max_tool_calls_per_turn: 2
  coding_temperature: 0.3
  judge_temperature: 0.3
  coding_llm:
    path: openai/gpt-5.4
    backend: OpenAI
    render: false
    temperature: 0.3
    top_p: 1.0
